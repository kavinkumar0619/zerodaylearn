    Z
  </text>

  <!-- D (Gradient) -->
  <text x="64%" y="67%"
        font-size="48"
        font-family="Inter, Arial, sans-serif"
        font-weight="800"
        fill="url(#gradD)"
        text-anchor="middle">
    D
  </text>
</svg>